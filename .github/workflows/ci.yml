# ─────────────────────────────────────────────────────────────────────────────
# Sintax CI/CD
#
#  On PR to main  → lint + build check + Firebase preview channel (reviewable URL)
#  On push main   → lint + build check
#                   + Docker build → Artifact Registry → Cloud Run  (backend)
#                   + Vite build   → Firebase Hosting live channel  (frontend)
#
# ── One-time GCP setup ───────────────────────────────────────────────────────
#
#  Replace PROJECT, REGION, SA with your values.
#
#  1. Enable APIs:
#       gcloud services enable \
#         run.googleapis.com \
#         artifactregistry.googleapis.com \
#         firebasehosting.googleapis.com
#
#  2. Create Artifact Registry repo:
#       gcloud artifacts repositories create sintax \
#         --repository-format=docker --location=REGION
#
#  3. Create a deployer service account and grant roles:
#       gcloud iam service-accounts create sintax-deployer \
#         --display-name="Sintax GitHub Actions deployer"
#       SA=sintax-deployer@PROJECT.iam.gserviceaccount.com
#       for ROLE in \
#           roles/run.developer \
#           roles/artifactregistry.writer \
#           roles/iam.serviceAccountUser \
#           roles/firebasehosting.admin; do
#         gcloud projects add-iam-policy-binding PROJECT \
#           --member="serviceAccount:$SA" --role=$ROLE
#       done
#
#  4. Download key and add GitHub secrets
#       gcloud iam service-accounts keys create key.json --iam-account=$SA
#
#  5. GitHub → repo Settings → Secrets → Actions → add:
#       GCP_PROJECT_ID          your GCP / Firebase project ID
#       GCP_SA_KEY              full contents of key.json
#       GCP_REGION              e.g. us-central1
#       ALLOWED_ORIGINS         https://PROJECT.web.app (your Firebase domain)
#       VITE_API_URL            Cloud Run URL (get after first backend deploy)
#       VITE_GA_MEASUREMENT_ID  GA4 Measurement ID, e.g. G-XXXXXXXXXX
# ─────────────────────────────────────────────────────────────────────────────

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Frontend: lint + build ───────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      # Keep the built dist/ for the deploy job
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── 2. Backend: syntax check ────────────────────────────────────────────────
  backend:
    name: Backend — syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        working-directory: backend
        run: |
          python -m py_compile app/__init__.py
          python -m py_compile app/main.py
          python -m py_compile app/models.py
          python -m py_compile app/mappings.py
          python -m py_compile app/analyzer.py

  # ── 3. Deploy backend → Cloud Run  (main branch only) ──────────────────────
  deploy-backend:
    name: Deploy — Cloud Run
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    env:
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sintax/sintax-backend

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # Cache from :latest so only the app-code layer rebuilds on each push.
      # First run is slow (~20 min) — PyTorch + spaCy model download.
      # Subsequent runs: ~2-3 min.
      - name: Build image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            ./backend

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sintax-backend \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --memory 4Gi \
            --cpu 1 \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 3 \
            --port 8000 \
            --allow-unauthenticated \
            --set-env-vars ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }} \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe sintax-backend \
            --region ${{ secrets.GCP_REGION }} \
            --format "value(status.url)"

  # ── 4. Deploy frontend → Firebase Hosting  (main = live, PR = preview) ─────
  deploy-frontend:
    name: Deploy — Firebase Hosting
    needs: [frontend, backend]
    # Run on main push (live deploy) AND on PRs (preview channel)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write   # needed to post the preview URL comment on PRs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          # On main: deploy to live channel. On PRs: temporary preview channel.
          channelId: ${{ github.ref == 'refs/heads/main' && 'live' || '' }}
